  <rect x="16" y="16" class="cleft" width="1" height="1"/>
  <rect x="17" y="16" class="peach-mid" width="8" height="1"/>
  <rect x="25" y="16" class="peach-dark" width="1" height="1"/>
  <rect x="7" y="17" class="peach-mid" width="9" height="1"/>
  <rect x="16" y="17" class="cleft" width="1" height="1"/>
  <rect x="17" y="17" class="peach-mid" width="7" height="1"/>
  <rect x="24" y="17" class="peach-dark" width="1" height="1"/>
  <rect x="7" y="18" class="peach-mid" width="9" height="1"/>
  <rect x="16" y="18" class="cleft" width="1" height="1"/>
