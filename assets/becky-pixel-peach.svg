  <rect x="22" y="9" class="peach-mid" width="2" height="1"/>
  <rect x="24" y="9" class="peach-dark" width="1" height="1"/>
  <rect x="7" y="10" class="peach-light" width="6" height="1"/>
  <rect x="13" y="10" class="peach-shine" width="2" height="1"/>
  <rect x="15" y="10" class="peach-light" width="1" height="1"/>
  <rect x="16" y="10" class="cleft" width="1" height="1"/>
  <rect x="17" y="10" class="peach-light" width="6" height="1"/>
  <rect x="23" y="10" class="peach-mid" width="2" height="1"/>
  <rect x="6" y="11" class="peach-light" width="2" height="1"/>
  <rect x="8" y="11" class="peach-mid" width="5" height="1"/>
  <rect x="13" y="11" class="peach-light" width="3" height="1"/>
  <rect x="16" y="11" class="cleft" width="1" height="1"/>
