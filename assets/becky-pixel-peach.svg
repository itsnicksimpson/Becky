  <rect x="17" y="14" class="peach-mid" width="8" height="1"/>
  <rect x="25" y="14" class="peach-dark" width="1" height="1"/>
  <rect x="6" y="15" class="peach-mid" width="10" height="1"/>
  <rect x="16" y="15" class="cleft" width="1" height="1"/>
  <rect x="17" y="15" class="peach-mid" width="8" height="1"/>
  <rect x="25" y="15" class="peach-dark" width="1" height="1"/>
